<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg-page); padding: 26px; color: var(--ink-900); }
  .row { display:flex; gap:14px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .lbl { font-size:.78rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color: var(--text-muted); margin:18px 0 8px; }
  .lbl:first-child { margin-top:0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, Tag, Rating, Avatar, Input } = window.DesignSystem_580998;
  function Demo() {
    return (
      <div>
        <div className="lbl">Buttons</div>
        <div className="row">
          <Button variant="primary">Add a spot</Button>
          <Button variant="secondary">Save</Button>
          <Button variant="outline" iconLeft={<i className="ph ph-map-pin" />}>Directions</Button>
          <Button variant="ghost">Skip</Button>
          <Button size="sm">Small</Button>
          <Button disabled>Disabled</Button>
        </div>

        <div className="lbl">Badges</div>
        <div className="row">
          <Badge tone="open">Open now</Badge>
          <Badge tone="closed">Closed</Badge>
          <Badge tone="favourite" solid>★ Local favourite</Badge>
          <Badge tone="info">New this week</Badge>
          <Badge tone="neutral">$$</Badge>
        </div>

        <div className="lbl">Tags / filter chips</div>
        <div className="row">
          <Tag>Momo</Tag>
          <Tag>Thakali</Tag>
          <Tag clickable active>Newari</Tag>
          <Tag clickable>Veg-friendly</Tag>
          <Tag clickable>Sel roti</Tag>
        </div>

        <div className="lbl">Rating & Avatar</div>
        <div className="row">
          <Rating value={4.7} count={212} />
          <Rating value={3.5} size={16} />
          <Avatar name="Anish Gurung" />
          <Avatar name="Maya Shrestha" ring />
        </div>

        <div className="lbl">Input</div>
        <div className="row">
          <div style={{width:'320px'}}>
            <Input placeholder="Search momo, thali, suburb…" iconLeft={<i className="ph ph-magnifying-glass" />} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
