<!-- @dsCard group="Colors" viewport="700x180" name="Accents — Himalaya & Coriander" subtitle="Cool teal and fresh green counterpoints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg-page); color: var(--text-strong); padding: 22px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { flex:1 1 0; min-width:90px; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); }
  .chip { height:64px; }
  .meta { padding:8px 10px; background:#fff; }
  .name { font-weight:700; font-size:13px; }
  .hex { font-size:12px; color: var(--text-muted); letter-spacing:.02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--himalaya-100)"></div><div class="meta"><div class="name">Himalaya 100</div><div class="hex">#D5F0F2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--himalaya-500)"></div><div class="meta"><div class="name">Himalaya 500</div><div class="hex">#1B98A8 · teal</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--himalaya-700)"></div><div class="meta"><div class="name">Himalaya 700</div><div class="hex">#0E6F7C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--coriander-500)"></div><div class="meta"><div class="name">Coriander 500</div><div class="hex">#4A9D5B · green</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--coriander-700)"></div><div class="meta"><div class="name">Coriander 700</div><div class="hex">#2F7B40</div></div></div>
  </div>
</body>
</html>
