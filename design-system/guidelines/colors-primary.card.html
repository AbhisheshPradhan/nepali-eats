<!-- @dsCard group="Colors" viewport="700x180" name="Primary — Chili & Marigold" subtitle="Brand reds and golds, the appetite drivers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg-page); color: var(--text-strong); padding: 22px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { flex:1 1 0; min-width:90px; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); }
  .chip { height:64px; }
  .meta { padding:8px 10px; background:#fff; }
  .name { font-weight:700; font-size:13px; }
  .hex { font-size:12px; color: var(--text-muted); letter-spacing:.02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--chili-500)"></div><div class="meta"><div class="name">Chili 500</div><div class="hex">#E5392B · primary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--chili-600)"></div><div class="meta"><div class="name">Chili 600</div><div class="hex">#D72631 · hover</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--chili-700)"></div><div class="meta"><div class="name">Chili 700</div><div class="hex">#B01622 · press</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--marigold-500)"></div><div class="meta"><div class="name">Marigold 500</div><div class="hex">#F5A623 · secondary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--marigold-600)"></div><div class="meta"><div class="name">Marigold 600</div><div class="hex">#E2900F · hover</div></div></div>
  </div>
</body>
</html>
