<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg-page); padding: 26px; display:flex; gap:32px; align-items:center; }
  .eyebrow { font-weight:700; font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; }
</style>
</head>
<body>
  <span class="eyebrow" style="color:var(--chili-500)">★ Local Favourite</span>
  <span class="eyebrow" style="color:var(--himalaya-700)">Newari Kitchen</span>
  <span class="eyebrow" style="color:var(--text-muted)">Open now · 0.4 km</span>
</body>
</html>
