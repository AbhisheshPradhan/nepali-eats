<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — Paper & Ink" subtitle="Warm cream surfaces and warm-black text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg-page); color: var(--text-strong); padding: 22px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { flex:1 1 0; min-width:84px; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); border:1px solid var(--border-soft); }
  .chip { height:60px; }
  .meta { padding:7px 9px; background:#fff; }
  .name { font-weight:700; font-size:12px; }
  .hex { font-size:11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><div class="meta"><div class="name">Paper 50</div><div class="hex">#FFFBF4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><div class="meta"><div class="name">Paper 100</div><div class="hex">#FFF6E9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-200)"></div><div class="meta"><div class="name">Paper 200</div><div class="hex">#FBEAD3</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="name">Ink 500</div><div class="hex">#7A6453</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">Ink 700</div><div class="hex">#4D3829</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#2B1A12</div></div></div>
  </div>
</body>
</html>
