<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg-page); color: var(--text-strong); padding: 24px; }
  .line { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--border-soft); padding:7px 0; }
  .tok { width:120px; flex:none; font-size:12px; color:var(--text-muted); }
  .d { font-family: var(--font-display); font-weight:700; }
</style>
</head>
<body>
  <div class="line"><span class="tok">--fs-h1 · 2.5rem</span><span class="d" style="font-size:2.5rem">Hidden gems</span></div>
  <div class="line"><span class="tok">--fs-h2 · 2rem</span><span class="d" style="font-size:2rem">Hidden gems</span></div>
  <div class="line"><span class="tok">--fs-h3 · 1.5rem</span><span class="d" style="font-size:1.5rem">Hidden gems</span></div>
  <div class="line"><span class="tok">--fs-lead · 1.25rem</span><span style="font-size:1.25rem">Hidden gems near you</span></div>
  <div class="line"><span class="tok">--fs-body · 1.06rem</span><span style="font-size:1.0625rem">Hidden gems near you</span></div>
  <div class="line"><span class="tok">--fs-sm · 0.94rem</span><span style="font-size:.9375rem">Hidden gems near you</span></div>
</body>
</html>
