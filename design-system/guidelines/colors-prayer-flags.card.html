<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg-page); color: var(--text-strong); padding: 22px; }
  .flags { display:flex; gap:0; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); }
  .flag { flex:1; height:74px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:8px; font-size:12px; font-weight:700; }
</style>
</head>
<body>
  <div class="flags">
    <div class="flag" style="background:var(--flag-blue);color:#fff">Blue</div>
    <div class="flag" style="background:var(--flag-white);color:var(--text-muted);border:1px solid var(--border-soft)">White</div>
    <div class="flag" style="background:var(--flag-red);color:#fff">Red</div>
    <div class="flag" style="background:var(--flag-green);color:#fff">Green</div>
    <div class="flag" style="background:var(--flag-yellow);color:var(--ink-900)">Yellow</div>
  </div>
</body>
</html>
